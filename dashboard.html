<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KamaCache 管理控制台</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --panel: #fff;
      --ink: #17202a;
      --muted: #66758a;
      --line: #dbe3ec;
      --blue: #2563eb;
      --green: #0f9f6e;
      --amber: #d99121;
      --red: #d94b4b;
      --shadow: 0 12px 30px rgba(23, 32, 42, .08);
      font-family: Inter, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; color: var(--ink); background: var(--bg); }
    header {
      position: sticky; top: 0; z-index: 2;
      background: rgba(255,255,255,.86); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
    }
    .topbar {
      max-width: 1380px; margin: 0 auto; padding: 18px 22px;
      display: flex; justify-content: space-between; align-items: center; gap: 16px;
    }
    h1 { margin: 0; font-size: 20px; letter-spacing: 0; }
    .sub { color: var(--muted); font-size: 13px; margin-top: 5px; }
    main {
      max-width: 1380px; margin: 0 auto; padding: 22px;
      display: grid; grid-template-columns: 310px minmax(0, 1fr) 340px; gap: 18px;
      align-items: start;
    }
    section, aside {
      background: var(--panel); border: 1px solid var(--line);
      border-radius: 8px; box-shadow: var(--shadow);
    }
    .head {
      padding: 15px 16px; border-bottom: 1px solid var(--line);
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    h2 { margin: 0; font-size: 15px; }
    .hint { color: var(--muted); font-size: 12px; }
    button, input {
      font: inherit; border-radius: 8px; min-height: 38px;
      border: 1px solid var(--line); background: #fff; color: var(--ink);
    }
    button { cursor: pointer; padding: 0 12px; }
    button.primary { background: var(--blue); border-color: var(--blue); color: #fff; }
    button.danger { color: var(--red); }
    input { padding: 0 11px; min-width: 0; }
    .tools { display: flex; gap: 9px; flex-wrap: wrap; justify-content: flex-end; }
    .nodes, .content { padding: 12px; display: grid; gap: 10px; }
    .node {
      width: 100%; text-align: left; padding: 12px; display: grid; gap: 8px;
      background: #f8fafc; border: 1px solid transparent; border-radius: 8px;
    }
    .node.active { background: #fff; border-color: #9db7ef; box-shadow: 0 8px 20px rgba(37,99,235,.12); }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .muted { color: var(--muted); font-size: 13px; overflow-wrap: anywhere; }
    .badge {
      border-radius: 999px; padding: 4px 8px; font-size: 12px;
      color: var(--green); border: 1px solid currentColor; background: rgba(15,159,110,.08);
    }
    .badge.Draining { color: var(--amber); background: rgba(217,145,33,.09); }
    .badge.Offline { color: var(--red); background: rgba(217,75,75,.09); }
    .grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
    .metric { border: 1px solid var(--line); border-radius: 8px; padding: 12px; background: #fbfcfd; }
    .metric strong { display: block; margin-top: 8px; font-size: 22px; overflow-wrap: anywhere; }
    .kv { display: grid; grid-template-columns: 92px minmax(0, 1fr); gap: 10px; font-size: 14px; }
    .kv span:first-child { color: var(--muted); }
    canvas { width: 100%; min-height: 320px; aspect-ratio: 1.7; border: 1px solid var(--line); border-radius: 8px; background: #fbfcfd; }
    .query { display: grid; grid-template-columns: 1fr auto; gap: 10px; }
    .result, .event {
      border: 1px solid var(--line); border-radius: 8px; background: #fbfcfd; padding: 11px;
      font-size: 14px;
    }
    .event { border-left: 3px solid #0891b2; color: var(--muted); }
    @media (max-width: 1120px) {
      main { grid-template-columns: 300px minmax(0, 1fr); }
      .right { grid-column: 1 / -1; }
    }
    @media (max-width: 820px) {
      main { grid-template-columns: 1fr; padding: 14px; }
      .topbar { padding: 14px; align-items: flex-start; flex-direction: column; }
      .grid, .query { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div>
        <h1>KamaCache 管理控制台</h1>
        <div class="sub" id="mode">连接后端 API 中...</div>
      </div>
      <div class="tools">
        <button id="refreshBtn">刷新</button>
        <button id="demoBtn">模拟请求</button>
      </div>
    </div>
  </header>

  <main>
    <aside>
      <div class="head"><h2>节点</h2><span class="hint" id="nodeCount">0</span></div>
      <div class="nodes" id="nodes"></div>
    </aside>

    <div class="content" style="padding:0;background:transparent;border:0;box-shadow:none">
      <section>
        <div class="head"><h2>哈希环</h2><span class="hint" id="ringCount">0 虚拟节点</span></div>
        <div class="content"><canvas id="ring" width="900" height="520"></canvas></div>
      </section>

      <section>
        <div class="head"><h2>Status</h2><span class="hint">Group Stats</span></div>
        <div class="content"><div class="grid" id="stats"></div></div>
      </section>

      <section>
        <div class="head"><h2>查询测试</h2><span class="hint">GET /api/cache/query</span></div>
        <div class="content">
          <div class="query">
            <input id="keyInput" placeholder="输入 key，例如 key_A 或 key_1" />
            <button class="primary" id="queryBtn">查询</button>
          </div>
          <div class="result" id="queryResult">等待查询。</div>
        </div>
      </section>
    </div>

    <aside class="right">
      <div class="head"><h2>节点详情</h2><span class="hint" id="selectedName"></span></div>
      <div class="content" id="detail"></div>

      <div class="head"><h2>节点管理</h2><span class="hint">POST / DELETE</span></div>
      <div class="content">
        <input id="newAddr" placeholder="addr，例如 localhost:8004" />
        <div class="row">
          <button class="primary" id="addBtn">新增节点</button>
          <button class="danger" id="deleteBtn">删除当前</button>
        </div>
      </div>

      <div class="head"><h2>事件</h2><span class="hint">最近操作</span></div>
      <div class="content" id="events"></div>
    </aside>
  </main>

  <script>
    const colors = ["#2563eb", "#0f9f6e", "#d99121", "#d94b4b", "#0891b2", "#7c3aed"];
    const state = { nodes: [], ring: [], groups: {}, selected: "", events: [] };
    const $ = (id) => document.getElementById(id);

    async function api(path, options) {
      const res = await fetch(path, { headers: { "Content-Type": "application/json" }, ...options });
      const body = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(body.error || res.statusText);
      return body;
    }

    function pushEvent(text) {
      state.events.push(`${new Date().toLocaleTimeString()} ${text}`);
      renderEvents();
    }

    async function refresh() {
      try {
        const [nodesRes, ringRes, statsRes] = await Promise.all([
          api("/api/nodes"),
          api("/api/hash-ring"),
          api("/api/stats")
        ]);
        state.groups = statsRes.groups || nodesRes.groups || {};
        state.ring = ringRes.ring?.virtual_nodes || [];
        state.nodes = normalizeNodes(nodesRes);
        if (!state.selected && state.nodes.length) state.selected = state.nodes[0].addr;
        $("mode").textContent = "已连接 Gin HTTP 管理接口";
        render();
      } catch (err) {
        $("mode").textContent = `API 连接失败：${err.message}`;
        pushEvent(`API 连接失败：${err.message}`);
      }
    }

    function normalizeNodes(data) {
      const groups = Object.keys(data.groups || {});
      const peers = data.picker?.peers || [];
      if (!peers.length && data.server) {
        return [{ addr: data.server.addr, status: data.server.status, self: true, groups }];
      }
      return peers.map((peer) => ({
        addr: peer.addr,
        status: peer.status,
        self: peer.self,
        groups
      }));
    }

    function selectedNode() {
      return state.nodes.find((node) => node.addr === state.selected) || state.nodes[0];
    }

    function render() {
      renderNodes();
      renderDetail();
      renderRing();
      renderStats();
      renderEvents();
    }

    function renderNodes() {
      $("nodeCount").textContent = `${state.nodes.length} 个节点`;
      $("nodes").innerHTML = state.nodes.map((node) => `
        <button class="node ${node.addr === state.selected ? "active" : ""}" data-addr="${node.addr}">
          <div class="row"><strong>${node.self ? "Self" : "Peer"}</strong><span class="badge ${node.status}">${node.status}</span></div>
          <div class="muted">${node.addr}</div>
          <div class="muted">${(node.groups || []).join(", ") || "no group"}</div>
        </button>
      `).join("");
      document.querySelectorAll(".node").forEach((btn) => {
        btn.onclick = () => { state.selected = btn.dataset.addr; render(); };
      });
    }

    function renderDetail() {
      const node = selectedNode();
      if (!node) {
        $("selectedName").textContent = "";
        $("detail").innerHTML = "<div class='muted'>暂无节点。</div>";
        return;
      }
      const groupName = node.groups?.[0] || "test";
      const groupStats = state.groups[groupName] || {};
      $("selectedName").textContent = node.addr;
      $("detail").innerHTML = `
        <div class="kv"><span>addr</span><strong>${node.addr}</strong></div>
        <div class="kv"><span>status</span><strong>${node.status}</strong></div>
        <div class="kv"><span>group</span><strong>${groupName}</strong></div>
        <div class="kv"><span>maincache</span><strong>${groupStats.cache_size ?? 0} keys</strong></div>
        <div class="kv"><span>hit_rate</span><strong>${formatRate(groupStats.hit_rate)}</strong></div>
      `;
    }

    function renderStats() {
      const firstGroup = Object.values(state.groups)[0] || {};
      const items = [
        ["loads", firstGroup.loads ?? 0],
        ["hit_rate", formatRate(firstGroup.hit_rate)],
        ["local_hits", firstGroup.local_hits ?? 0],
        ["local_misses", firstGroup.local_misses ?? 0],
        ["peer_hits", firstGroup.peer_hits ?? 0],
        ["loader_hits", firstGroup.loader_hits ?? 0],
        ["cache_size", firstGroup.cache_size ?? 0],
        ["avg_load_ms", number(firstGroup.avg_load_time_ms)]
      ];
      $("stats").innerHTML = items.map(([k, v]) => `<div class="metric"><span>${k}</span><strong>${v}</strong></div>`).join("");
    }

    function renderRing() {
      $("ringCount").textContent = `${state.ring.length} 虚拟节点`;
      const canvas = $("ring");
      const ctx = canvas.getContext("2d");
      const w = canvas.width, h = canvas.height, cx = w / 2, cy = h / 2;
      const r = Math.min(w, h) * .34;
      ctx.clearRect(0, 0, w, h);
      ctx.lineWidth = 22;
      ctx.strokeStyle = "#e8eef5";
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();

      const addrIndex = new Map(state.nodes.map((n, i) => [n.addr, i]));
      const points = [...state.ring].sort((a, b) => a.hash - b.hash);
      points.forEach((p, i) => {
        const next = points[i + 1] || points[0];
        let start = angle(p.hash), end = angle(next.hash);
        if (i === points.length - 1) end += Math.PI * 2;
        ctx.strokeStyle = colors[(addrIndex.get(p.addr) ?? 0) % colors.length];
        ctx.beginPath(); ctx.arc(cx, cy, r, start, end); ctx.stroke();
      });
      points.forEach((p) => {
        const a = angle(p.hash);
        ctx.fillStyle = colors[(addrIndex.get(p.addr) ?? 0) % colors.length];
        ctx.beginPath(); ctx.arc(cx + Math.cos(a) * r, cy + Math.sin(a) * r, 4, 0, Math.PI * 2); ctx.fill();
      });
      ctx.fillStyle = "#17202a"; ctx.font = "700 26px Segoe UI"; ctx.textAlign = "center";
      ctx.fillText(String(state.nodes.length), cx, cy - 6);
      ctx.fillStyle = "#66758a"; ctx.font = "15px Segoe UI";
      ctx.fillText("nodes", cx, cy + 22);
    }

    function angle(hash) {
      const max = 4294967295;
      return (Math.abs(hash) / max) * Math.PI * 2 - Math.PI / 2;
    }

    function renderEvents() {
      $("events").innerHTML = state.events.slice(-8).reverse().map((e) => `<div class="event">${e}</div>`).join("");
    }

    async function queryKey() {
      const key = $("keyInput").value.trim();
      if (!key) return;
      try {
        const data = await api(`/api/cache/query?group=test&key=${encodeURIComponent(key)}`);
        $("queryResult").innerHTML = `
          <div class="kv"><span>key</span><strong>${data.key}</strong></div>
          <div class="kv"><span>value</span><strong>${data.value}</strong></div>
          <div class="kv"><span>hit_rate</span><strong>${formatRate(data.stats?.hit_rate)}</strong></div>
        `;
        pushEvent(`查询 ${key}`);
        await refresh();
      } catch (err) {
        $("queryResult").textContent = err.message;
      }
    }

    async function addNode() {
      const addr = $("newAddr").value.trim();
      if (!addr) return;
      try {
        await api("/api/nodes", { method: "POST", body: JSON.stringify({ addr }) });
        $("newAddr").value = "";
        pushEvent(`新增节点 ${addr}`);
        await refresh();
      } catch (err) {
        pushEvent(`新增失败：${err.message}`);
      }
    }

    async function deleteNode() {
      const node = selectedNode();
      if (!node) return;
      try {
        await api(`/api/nodes?addr=${encodeURIComponent(node.addr)}`, { method: "DELETE" });
        state.selected = "";
        pushEvent(`删除节点 ${node.addr}`);
        await refresh();
      } catch (err) {
        pushEvent(`删除失败：${err.message}`);
      }
    }

    async function simulateTraffic() {
      for (const key of ["key_A", "key_B", "key_C", "key_1", "key_2"]) {
        $("keyInput").value = key;
        await queryKey();
      }
    }

    function formatRate(value) {
      if (value === undefined || value === null) return "0%";
      return `${(Number(value) * 100).toFixed(1)}%`;
    }

    function number(value) {
      if (value === undefined || value === null) return 0;
      return Number(value).toFixed(3);
    }

    $("refreshBtn").onclick = refresh;
    $("queryBtn").onclick = queryKey;
    $("keyInput").onkeydown = (e) => { if (e.key === "Enter") queryKey(); };
    $("addBtn").onclick = addNode;
    $("deleteBtn").onclick = deleteNode;
    $("demoBtn").onclick = simulateTraffic;
    refresh();
  </script>
</body>
</html>
